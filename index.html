<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zaldy L. Bernabe - BSME | Senior Commissioning Engineer</title>
<style>
:root {
  --primary: #007bff;
  --primary-dark: #0056b3;
  --navy: #004080;
  --green: #28a745;
  --bg-dark: #0a1128;
  --bg-card: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; scroll-padding-top: 80px; }

body {
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  line-height: 1.6;
  color: #333;
  background: #f0f2f5;
  overflow-x: hidden;
}

/* ===== STICKY NAV ===== */
.navbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(10, 17, 40, 0.95);
  backdrop-filter: blur(12px);
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  padding: 12px 0;
}
.nav-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-wrap: wrap;
}
.nav-logo {
  color: #fff;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 1px;
}
.nav-logo span { color: #4dabff; }
.nav-links {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}
.nav-links a {
  color: #cfd8e3;
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: 8px;
  transition: all 0.25s ease;
}
.nav-links a:hover {
  background: linear-gradient(45deg, var(--primary), var(--primary-dark));
  color: #fff;
  transform: translateY(-2px);
}
.nav-toggle {
  display: none;
  background: none;
  border: none;
  color: #fff;
  font-size: 1.6rem;
  cursor: pointer;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff;
  padding: 100px 20px 60px;
  background: linear-gradient(135deg, #0a1128 0%, #001f4d 50%, #003d80 100%);
  overflow: hidden;
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,123,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(40,167,69,0.2), transparent 40%);
  animation: float 12s ease-in-out infinite alternate;
}
@keyframes float {
  0% { transform: translateY(0) scale(1); }
  100% { transform: translateY(-30px) scale(1.1); }
}
.hero-content { position: relative; z-index: 2; max-width: 900px; animation: fadeUp 1s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}
.hero .badge {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.25);
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 0.85rem;
  letter-spacing: 1px;
  margin-bottom: 25px;
  backdrop-filter: blur(6px);
}
.hero h1 {
  font-size: clamp(2.2rem, 6vw, 4rem);
  font-weight: 800;
  line-height: 1.1;
  background: linear-gradient(90deg, #fff, #7cc2ff);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 18px;
}
.hero .subtitle {
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  color: #b9c9dc;
  font-weight: 400;
  max-width: 760px;
  margin: 0 auto 20px;
  line-height: 1.5;
}
.hero .location {
  color: #8fa5bf;
  font-size: 0.95rem;
  margin-bottom: 35px;
}
.hero .location a { color: #7cc2ff; text-decoration: none; }

/* Hero stat chips */
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}
.stat { text-align: center; }
.stat .num { font-size: 2rem; font-weight: 800; color: #4dabff; }
.stat .label { font-size: 0.8rem; color: #9db3cc; letter-spacing: 1px; }

/* Hero CTA buttons */
.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}
.hero-cta a {
  padding: 12px 22px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 700;
  font-size: 0.9rem;
  transition: all 0.3s ease;
  border: 2px solid rgba(255,255,255,0.3);
  color: #fff;
  background: rgba(255,255,255,0.06);
}
.hero-cta a:hover {
  background: linear-gradient(45deg, var(--primary), var(--primary-dark));
  border-color: transparent;
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,123,255,0.4);
}
.hero-cta a.primary {
  background: linear-gradient(45deg, var(--green), #1c7c34);
  border-color: transparent;
}

/* ===== SECTIONS ===== */
.section {
  max-width: 960px;
  margin: 0 auto;
  padding: 70px 20px 20px;
}
.card {
  background: var(--bg-card);
  border-radius: 18px;
  padding: 35px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  border: 1px solid #eef1f5;
}
h3 {
  color: var(--navy);
  font-size: 1.8rem;
  margin-bottom: 25px;
  position: relative;
  padding-bottom: 12px;
  display: inline-block;
}
h3::after {
  content: "";
  position: absolute;
  left: 0; bottom: 0;
  width: 60%;
  height: 4px;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--green), var(--primary));
}
p { margin-bottom: 16px; font-size: 1.05rem; }
.highlight { font-weight: 700; color: var(--primary); }

/* Skills grid */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 18px;
}
.skill-category {
  background: linear-gradient(135deg, #f8faff, #eef5ff);
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #dbeafe;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.skill-category:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 25px rgba(0,86,179,0.15);
}
.skill-category strong { color: var(--primary-dark); display: block; margin-bottom: 8px; font-size: 1.05rem; }

/* Experience */
.experience-item {
  border-left: 5px solid var(--primary);
  padding: 20px;
  margin-bottom: 22px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.05);
  transition: transform 0.3s ease;
}
.experience-item:hover { transform: translateX(6px); }
.experience-item .role { font-weight: 700; color: var(--navy); font-size: 1.15rem; }
.experience-item .company { color: var(--primary-dark); font-weight: 600; }
.experience-item .period { color: #777; font-style: italic; font-size: 0.9rem; }
.experience-item ul { margin: 12px 0 0; padding-left: 20px; }
.experience-item li { margin-bottom: 8px; }

/* Lists */
.achievements-list, .education-list, .memberships-list { list-style: none; }
.achievements-list li, .education-list li, .memberships-list li {
  padding: 16px 18px;
  margin-bottom: 12px;
  border-radius: 12px;
  background: linear-gradient(135deg, #e6f7ea, #f0fff4);
  border-left: 5px solid var(--green);
  transition: transform 0.3s ease;
}
.achievements-list li:hover, .education-list li:hover, .memberships-list li:hover {
  transform: translateX(6px);
}

/* Contact */
.contact-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
  margin-top: 10px;
}
.contact-card {
  background: linear-gradient(135deg, #001f4d, #003d80);
  color: #fff;
  padding: 25px;
  border-radius: 14px;
  text-align: center;
  text-decoration: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.contact-card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,63,128,0.4); }
.contact-card .ico { font-size: 1.8rem; margin-bottom: 8px; }
.contact-card .txt { font-size: 0.95rem; word-break: break-word; }

/* Footer */
.footer {
  text-align: center;
  margin-top: 40px;
  padding: 40px 20px;
  background: var(--bg-dark);
  color: #b9c9dc;
}
.footer a { color: #7cc2ff; text-decoration: none; }
.footer .tagline { font-style: italic; color: #8fa5bf; font-size: 0.95rem; max-width: 600px; margin: 12px auto; }

/* Back to top */
.back-top {
  position: fixed;
  bottom: 25px; right: 25px;
  background: linear-gradient(45deg, var(--primary), var(--primary-dark));
  color: #fff;
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  text-decoration: none;
